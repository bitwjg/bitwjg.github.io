<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 680" role="img" aria-labelledby="title desc">
  <title id="title">MATH500 at 32K: quality versus visible reasoning</title>
  <desc id="desc">A quality-token chart comparing smaller and larger GPT-OSS and Qwen3.5 models. Both larger models move toward higher accuracy and fewer relative thinking tokens.</desc>
  <defs>
    <style>
      text { font-family: "IBM Plex Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #201f1a; }
      .title { font-family: "IBM Plex Serif", Georgia, serif; font-size: 28px; font-weight: 600; }
      .subtitle { font-size: 15px; fill: #6b6458; }
      .axis-label { font-size: 15px; font-weight: 600; }
      .tick { font-size: 13px; fill: #6b6458; }
      .grid { stroke: #ded8ce; stroke-width: 1; }
      .axis { stroke: #6b6458; stroke-width: 1.5; }
      .series { fill: none; stroke-width: 4; }
      .series--gpt { stroke: #1f6fc6; }
      .series--qwen { stroke: #c65a1f; }
      .small { fill: #fffdf8; stroke-width: 4; }
      .large { stroke: #fffdf8; stroke-width: 2; }
      .gpt { stroke: #1f6fc6; fill: #1f6fc6; }
      .qwen { stroke: #c65a1f; fill: #c65a1f; }
      .small.gpt, .small.qwen { fill: #fffdf8; }
      .point-label { font-size: 14px; font-weight: 600; }
      .point-value { font-size: 13px; fill: #6b6458; }
      .note { font-size: 13px; fill: #6b6458; }
      .better { font-size: 13px; font-weight: 600; fill: #1f6fc6; }
    </style>
  </defs>
  <rect width="1100" height="680" rx="18" fill="#fffdf8"/>
  <text x="58" y="54" class="title">MATH500 at 32K: quality vs. visible reasoning</text>
  <text x="58" y="82" class="subtitle">K=8; thinking tokens normalized within each family (smaller model = 100)</text>

  <line x1="150" y1="130" x2="150" y2="560" class="axis"/>
  <line x1="150" y1="560" x2="1000" y2="560" class="axis"/>

  <g aria-hidden="true">
    <line x1="150" y1="474" x2="1000" y2="474" class="grid"/><text x="132" y="479" text-anchor="end" class="tick">20%</text>
    <line x1="150" y1="388" x2="1000" y2="388" class="grid"/><text x="132" y="393" text-anchor="end" class="tick">40%</text>
    <line x1="150" y1="302" x2="1000" y2="302" class="grid"/><text x="132" y="307" text-anchor="end" class="tick">60%</text>
    <line x1="150" y1="216" x2="1000" y2="216" class="grid"/><text x="132" y="221" text-anchor="end" class="tick">80%</text>
    <line x1="150" y1="130" x2="1000" y2="130" class="grid"/><text x="132" y="135" text-anchor="end" class="tick">100%</text>

    <line x1="150" y1="130" x2="150" y2="560" class="grid"/><text x="150" y="585" text-anchor="middle" class="tick">30</text>
    <line x1="262" y1="130" x2="262" y2="560" class="grid"/><text x="262" y="585" text-anchor="middle" class="tick">40</text>
    <line x1="374" y1="130" x2="374" y2="560" class="grid"/><text x="374" y="585" text-anchor="middle" class="tick">50</text>
    <line x1="486" y1="130" x2="486" y2="560" class="grid"/><text x="486" y="585" text-anchor="middle" class="tick">60</text>
    <line x1="598" y1="130" x2="598" y2="560" class="grid"/><text x="598" y="585" text-anchor="middle" class="tick">70</text>
    <line x1="711" y1="130" x2="711" y2="560" class="grid"/><text x="711" y="585" text-anchor="middle" class="tick">80</text>
    <line x1="823" y1="130" x2="823" y2="560" class="grid"/><text x="823" y="585" text-anchor="middle" class="tick">90</text>
    <line x1="935" y1="130" x2="935" y2="560" class="grid"/><text x="935" y="585" text-anchor="middle" class="tick">100</text>
  </g>

  <text x="575" y="625" text-anchor="middle" class="axis-label">Relative thinking tokens ← fewer is better</text>
  <text x="36" y="345" text-anchor="middle" transform="rotate(-90 36 345)" class="axis-label">Accuracy avg@8 → higher is better</text>

  <line x1="935" y1="148" x2="368" y2="142" class="series series--gpt"/>
  <circle cx="935" cy="148" r="9" class="small gpt"/>
  <polygon points="368,130 380,142 368,154 356,142" class="large gpt"/>
  <text x="805" y="111" class="point-label">GPT-OSS 20B</text>
  <text x="805" y="129" class="point-value">95.8% · 100</text>
  <text x="286" y="105" class="point-label">GPT-OSS 120B</text>
  <text x="286" y="123" class="point-value">97.2% · 49.4</text>

  <line x1="935" y1="159" x2="726" y2="139" class="series series--qwen"/>
  <circle cx="935" cy="159" r="9" class="small qwen"/>
  <polygon points="726,127 738,139 726,151 714,139" class="large qwen"/>
  <text x="804" y="191" class="point-label">Qwen3.5 9B</text>
  <text x="804" y="209" class="point-value">93.3% · 100</text>
  <text x="642" y="92" class="point-label">Qwen3.5 27B</text>
  <text x="642" y="110" class="point-value">98.0% · 81.3</text>

  <g transform="translate(58 654)">
    <circle cx="0" cy="-5" r="7" class="small gpt"/><text x="14" y="0" class="note">smaller model</text>
    <polygon points="145,-12 152,-5 145,2 138,-5" class="large gpt"/><text x="160" y="0" class="note">larger model</text>
  </g>
</svg>
